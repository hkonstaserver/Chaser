;----------------------------
;          CHASER ASM
;----------------------------


; CPU speed
_SPEED equ 50



; REGISTERS
;------------

KEYREG equ $ff
RANDOM equ $fe
TIMER  equ $fd

MATRIX equ $e0
DIGITS equ $f1


; Variables

KEY	equ $0c

DIRFLG   equ $10
HOLDFLG  equ $11
PATNUM   equ $12
PATCNT   equ $13
PATFRM   equ $14

PATPTRL   equ $15
PATPTRH   equ $16

PATBEGL  equ $17
PATBEGH  equ $18
PATENDL  equ $19
PATENDH  equ $20

MODE     equ $21
BCDHI    equ $22
BCDLO    equ $23
BCDBIN    equ $24

MSGPTRL  equ $25
MSGPTRH  equ $26  
NVFLAG   equ $27

TEMP1    equ $30
TEMP2    equ $31


 *ORG $1000


;-----------------
;      RESET
;-----------------


reset:
  sei
 
  lda #80
  sta TIMER	; set IRQ

  lda #$35
  sta MSGPTRH	; Night Vision message
  lda #0
  sta MSGPTRL
  
  lda #0
  sta HOLDFLG
  sta DIRFLG
  sta PATNUM
  jsr getpat

  lda #1
  sta NVFLAG    ; scroll NV message
      
  cli		; enable IRQ  
  jsr cdentry
  
  lda #0
  sta NVFLAG    ; chase mode
  lda #99
  sta TIMER	

  jmp modesel
 
  
  
;----------------
;  MODE SELECTOR
;----------------

modesel:
 
  lda #1   ; --Ch--
  sta MODE
  jsr dismsg

ms0:
  jsr getkey
  lda KEY
  cmp #11   ; mode
  beq ms1
  cmp #12   ; enter
  beq ms2  
  jmp ms0
  
ms1:
  inc MODE
  lda MODE
  cmp #5
  bne ms3
  lda #1
  sta MODE
ms3:
  jsr dismsg
  jmp ms0
  
ms2:
  lda #5
  jsr dismsg  ; ?-PA 00
  jsr input
  jmp ms4

ms5:  
  jsr getkey
  lda KEY
  
  cmp #11  ; mode
  beq modesel
  cmp #12  ; enter
  beq ms4
  
  tay
  ldx #5
  jsr showDigit
  jmp ms5
  
ms4:  
  lda #6
  jsr dismsg  ; 00 00 00
  ldy #1
  ldx #3
  jsr showDigit

  lda PATNUM
  ldx #0
  jsr showBCD

  jmp demo
  

; ---------------------
;      DEMO MODE
;----------------------
  
demo:

  jsr getkey
  lda KEY
  cmp #1
  beq up
  cmp #6
  beq down
  cmp #2
  beq speedup
  cmp #7
  beq speeddn
  cmp #3
  beq dirchg
  cmp #11
  beq modesel
  jmp demo

dirchg:
  jmp dirchg2    ; long branch...
  
up: 
  inc PATNUM
  lda PATNUM
  cmp #49
  bne up2
  lda #0
  sta PATNUM
up2:
  sta BCDBIN
  jsr getpat
  ldx #0
  jsr showBCD
  jmp demo
  
down:
  dec PATNUM
  lda PATNUM
  cmp #255
  bne down2
  lda #48
  sta PATNUM
down2:    
  sta BCDBIN
  jsr getpat
  ldx #0
  jsr showBCD
  jmp demo  

speedup:
  dec TIMER
  lda TIMER
  cmp #0
  bne spd2
  lda #99
  sta TIMER
spd2:
  sec
  lda #100
  sbc TIMER
  sta BCDBIN
  ldx #2
  jsr showBCD
  jmp demo

speeddn:
  inc TIMER
  lda TIMER
  cmp #100
  bne spd1
  lda #1
  sta TIMER
spd1:
  sec
  lda #100
  sbc TIMER
  sta BCDBIN
  ldx #2
  jsr showBCD
  jmp demo

dirchg2:
  inc DIRFLG
  lda DIRFLG
  and #1
  sta DIRFLG
  sta BCDBIN
  ldx #4
  jsr showBCD
  jmp demo


;-------------------
;   SHOW BCD VALUE
;    X: digit #
;-------------------

showBCD:

  lda BCDBIN
  jsr bin2bcd
  ldy BCDHI
  jsr showDigit
  inx
  ldy BCDLO
  jsr showDigit  
  rts

  
;----------------- 
;     GETKEY
;-----------------

getkey:
  lda #0
  sta KEYREG
  sta KEY
  
gk1:
  lda KEYREG
  beq gk1
  sta KEY
  rts


;-------------
;   INPUT
;-------------

input:

  ldy #0
  sty BCDLO
  sty BCDHI

  ldx #4
  jsr showDigit
  inx
  jsr showDigit

iwt:
  jsr getkey
  lda KEY
  cmp #10
  bne iwt9
  lda #0
  sta KEY
iwt9:
  cmp #12  ; ENTER
  beq iwt2

  ldy KEY
  sty BCDLO
  ldx #5
  jsr showDigit

  jsr getkey
  lda KEY
  cmp #10
  bne iwt8
  lda #0
  sta KEY
iwt8:
  cmp #12   ; ENTER
  beq iwt2

  ldy BCDLO
  sty BCDHI
  ldx #4
  jsr showDigit
  
  ldy KEY
  sty BCDLO
  ldx #5
  jsr showDigit
  jmp iwt

iwt2:
  jsr bcd2bin
  lda BCDBIN
  cmp #47
  bpl iwt4
  sta PATNUM
  jsr getpat
  rts

iwt4:
  lda #0
  sta PATNUM
  jsr getpat
  rts  


;---------------------
;  SECRET CODE ENTRY
;---------------------

cdentry:

  lda #0
  jsr dismsg

cden1:
  ldy #0
cden2:
  jsr getkey
  lda KEY
  cmp #12
  beq cd2
  cmp SECODE,y
  bne cden1

  iny
  cpy #4
  bne cden2
cd2:
  rts



;--------------------
;  DISPLAY MESSAGE
;   A= Msg number
;--------------------

dismsg: 
  
  asl
  sta TEMP1	
  asl
  clc
  adc TEMP1	  
  tax
  ldy #0
  
mess1:

  lda MESSAGES,x
  sta DIGITS,y
  iny
  inx
  cpy #6
  bne mess1
  rts


;------------------------
;   DISPLAY DIGIT
;  X=digit#  Y=Value 
;------------------------


showDigit:

  lda digdef,y
  sta DIGITS,x
  rts

  
;------------------
;     BIN2BCD  
;------------------

bin2bcd:

  ldy #0
  lda BCDBIN
  beq zero
  cmp #10
  bmi zero
sub1:
  iny
  sec
  sbc #10
  cmp #10
  bpl sub1
zero:
  sta BCDLO
  sty BCDHI
  rts


;------------------
;     bcd2bin
;------------------

bcd2bin:

  lda BCDHI
  asl
  sta TEMP1
  asl
  asl
  clc
  adc TEMP1
  adc BCDLO
  sta BCDBIN
  rts


;---------------------
;  RESET PAT POINTER
;---------------------

resetpat:

  lda #$40
  sta PATPTRH
  sta PATBEGH
  sta PATENDH
 
  lda #0
  sta PATPTRL
  sta PATBEGL
  sta PATENDL

  sta DIRFLG
  rts


;---------------
;  FIND PATTERN 
;---------------

getpat:

  inc HOLDFLG
  jsr resetpat
  
  ldy #0
  sty PATCNT

scan:
  lda ($15),y
  cmp PATNUM   
  beq found
  
  clc
  lda PATPTRL
  adc #9
  sta PATPTRL
  lda PATPTRH
  adc #0
  sta PATPTRH
  jmp scan
  
found:

  lda PATPTRH
  sta PATBEGH
  lda PATPTRL
  sta PATBEGL
  
scan2:
  clc
  lda PATPTRL
  adc #9
  sta PATPTRL
  lda PATPTRH
  adc #0
  sta PATPTRH
  
  lda ($15),y
  cmp PATNUM   ; end of pattern?
  beq scan2
  
  lda PATPTRH
  sta PATENDH
  lda PATPTRL
  sta PATENDL
  
  lda PATBEGH
  sta PATPTRH
  lda PATBEGL
  sta PATPTRL
 
  dec HOLDFLG
  rts


;----------------------
;      NEXT FRAME
;----------------------

nxtfrm:

  lda DIRFLG
  bne prevfrm  

  clc
  lda PATPTRL
  adc #9
  sta PATPTRL
  lda PATPTRH
  adc #0
  sta PATPTRH
  
  lda PATPTRH
  cmp PATENDH
  bne contfrm
  lda PATPTRL
  cmp PATENDL
  bne contfrm
  
  ; restart frame
  lda PATBEGH
  sta PATPTRH
  lda PATBEGL
  sta PATPTRL
  inc PATCNT    ; repeat counter
 
contfrm:  
  rts
 
prevfrm:
  sec
  lda PATPTRL
  sbc #9
  sta PATPTRL
  lda PATPTRH
  sbc #0
  sta PATPTRH

  lda PATPTRH
  cmp PATBEGH
  bne contfrm 
  lda PATPTRL
  cmp PATBEGL
  bne contfrm

  ; restart frame
  lda PATENDH
  sta PATPTRH
  lda PATENDL
  sta PATPTRL

  sec
  lda PATPTRL
  sbc #9
  sta PATPTRL
  lda PATPTRH
  sbc #0
  sta PATPTRH

  inc PATCNT   
  rts


;-----------------------
; DISPLAY PATTERN FRAME
;-----------------------

disfrm:

  lda HOLDFLG
  beq df1
  rts
  
df1:
  ldx #0
  ldy #1  ; after ID
  
nx1:
  lda ($15),y
  sta MATRIX,x
  inx
  iny
  cpx #8
  bne nx1

  jsr nxtfrm 
  rts


;-----------------------
; DISPLAY NV MESSAGE
;-----------------------

disnv:

  ldx #0
  ldy #0
  
nvx1:
  lda ($25),y
  cmp #$55
  beq nvdone 
  sta MATRIX,x
  inx
  iny
  cpx #8
  bne nvx1

  lda MSGPTRL
  clc
  adc #1
  sta MSGPTRL
  lda MSGPTRH
  adc #0
  sta MSGPTRH   
  rts

nvdone:

  lda #$35
  sta MSGPTRH
  lda #0
  sta MSGPTRL
  rts



; ---------------
; ----- IRQ -----
; ---------------

   *ORG   $f000

IRQ:
   
  sei
  pha
  txa
  pha
  tya
  pha

  lda NVFLAG
  beq irq2
  jsr disnv
  jmp irq3

irq2:
  jsr disfrm

irq3:
  pla
  tay
  pla
  tax
  pla
  cli
  rti


;---------------
;   MESSAGES
;---------------

  *ORG $2000

digdef:
  DCB 63,3,109,103,83,118,126,35
  DCB 127,119,123,94,60,79,124,120 
  

MESSAGES:
  DCB 60,79,105,105,105,105 ; Cd????
  DCB 64,64,60,90,64,64     ; --Ch--
  DCB 64,64,124,79,64,64    ; --Ed--
  DCB 64,64,121,124,64,64   ; --PE--
  DCB 64,64,79,124,64,64    ; --dE--
  DCB 105,64,121,123,63,63  ; ?-PA00
  DCB 63,63,63,63,63,63     ; 00 00 00

SECODE:
  DCB 1,9,8,8
