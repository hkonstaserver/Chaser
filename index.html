/*
[ADDRESS SPACE]

0x0000-0x0fff: RAM
0x00: Zero page RAM
0x100-0x1FF: Stack

0x1000-0xffff: ROM
0x1000-0xefff: Code space 
0xf000-0xffff: IRQ space

0xE0-0xEF: Matrix LEDs space
0xF0: Bargraph
0xF1-0xF6: Digits
0xFD: Timer register
0xFE: Random Register
0xFF: KEY Register

*/


// screen size
var screenW = 846;
var screenH = 280;

// Global canvas context
var ctx = 0; 


// -------------------------
//     Graphics functions 
// -------------------------

function createCanvas(width,height){

  var canvas;

  canvas = document.getElementById( "canvas" );
  canvas.width = screenW;
  canvas.height = screenH;
  canvas.style.backgroundColor = "white";
  canvas.style.marginBottom = 0;
  canvas.style.marginLeft=0;
  canvas.addEventListener('mousedown',tapEvent,false);

  document.body.appendChild(canvas);

  // Get canvas context
  ctx = canvas.getContext("2d");

  ctx.globalAlpha=1.0;
  //ctx.strokeOpacity=50;

  // clear canvas area 
  ctx.clearRect(0, 0, width,height);

}


function setPenColor(r,g,b) {
  s="rgb("+r+","+g+","+b+")";
  ctx.strokeStyle = s;
}


function setFillColor(r,g,b) {
  s="rgb("+r+","+g+","+b+")";
  ctx.fillStyle = s;
}


function setPenWidth(size) {
  ctx.lineWidth = size;
}


function drawDot(x, y, size) {
  ctx.fillRect(x, y, size, size);
}


function drawLine(x,y,dx,dy) {

  ctx.beginPath();
  ctx.moveTo(x,y);
  ctx.lineTo(dx,dy);
  ctx.stroke();
  ctx.closePath();

}


function drawRectangle(x,y,w,h) {
  ctx.strokeRect (x, y, w, h);
}


function fillRectangle(x, y, w, h) {
  ctx.fillRect(x, y, w, h);
}


function drawCircle(x, y, r) {
 
  var endAngle = Math.PI*2;

 // setPenWidth(2);
  ctx.beginPath();
  ctx.arc(x,y,r,0,endAngle,true);
  ctx.stroke();
 // setPenWidth(1);

}


// ----------------------------
//   HANDLE COMPILER MESSAGES 
// ----------------------------


function message(text) {

  return;

}


// --------------------------------
//       DISPLAY SEGMENT
// -------------------------------


function segment(id, value) {


  var xpos, gray=50;
  var y1=52, y2=77, y3=101;

  switch(id) {

    case 0: xpos=483; break;
    case 1: xpos=531; break;
    case 2: xpos=607; break;
    case 3: xpos=654; break;
    case 4: xpos=729; break;
    case 5: xpos=777; break;
    default: return;
  } 

  // clear digit
  setPenColor(100,gray,gray);
  setFillColor(100,gray,gray);
  setPenWidth(5);

  drawLine(xpos+29, y1,xpos+25, y2); // a 
  drawLine(xpos+25, y2,xpos+21, y3); // b
  drawLine(xpos-6,  y3,xpos+20, y3); // c
  drawLine(xpos-2,  y2,xpos-6,  y3); // d
  drawLine(xpos+3,  y1,xpos-2,  y2); // e
  drawLine(xpos+3,  y1,xpos+28, y1); // f
  drawLine(xpos-4,  y2,xpos+23, y2); // g
  drawLine(xpos+25, y3,xpos+30, y3); // h

  // red digits
  setPenColor(255,0,0);
  setFillColor(255,0,0);
  setPenWidth(4);

  if (((value >> 0) & 1) != 0) drawLine(xpos+29, y1,xpos+25, y2); // a 
  if (((value >> 1) & 1) != 0) drawLine(xpos+25, y2,xpos+21, y3); // b 
  if (((value >> 2) & 1) != 0) drawLine(xpos-6,  y3,xpos+20, y3); // c 
  if (((value >> 3) & 1) != 0) drawLine(xpos-2,  y2,xpos-6,  y3); // d  
  if (((value >> 4) & 1) != 0) drawLine(xpos+3,  y1,xpos-2,  y2); // e    
  if (((value >> 5) & 1) != 0) drawLine(xpos+3,  y1,xpos+28, y1); // f    
  if (((value >> 6) & 1) != 0) drawLine(xpos-4,  y2,xpos+23, y2); // g
  if (((value >> 7) & 1) != 0) drawLine(xpos+25, y3,xpos+30, y3); // h    
  

}



// --------------------------------
//       DISPLAY bargraph
// -------------------------------


function bargraph(value) {


  var xpos = 344, gray=160;
  var ypos=305, ypos2=375, spc=38;


  // clear digit
  setPenColor(gray,gray,gray);
  setFillColor(gray,gray,gray);
  setPenWidth(26);

  drawLine(xpos,ypos,xpos,ypos2); // a 
  drawLine(xpos+spc,ypos,xpos+spc,ypos2); // b
  drawLine(xpos+(spc*2),ypos,xpos+(spc*2),ypos2); // c
  drawLine(xpos+(spc*3),ypos,xpos+(spc*3),ypos2); // d
  drawLine(xpos+(spc*4),ypos,xpos+(spc*4),ypos2); // e
  drawLine(xpos+(spc*5),ypos,xpos+(spc*5),ypos2); // f
  drawLine(xpos+(spc*6),ypos,xpos+(spc*6),ypos2); // g
  drawLine(xpos+(spc*7),ypos,xpos+(spc*7),ypos2); // h

  // red digits
  setPenColor(210,0,0);
  setFillColor(255,0,0);
  setPenWidth(25);

  if (((value >> 7) & 1) != 0) drawLine(xpos,ypos,xpos,ypos2); // a 
  if (((value >> 6) & 1) != 0) drawLine(xpos+spc,ypos,xpos+spc,ypos2); // b
  if (((value >> 5) & 1) != 0) drawLine(xpos+(spc*2),ypos,xpos+(spc*2),ypos2); // c
  if (((value >> 4) & 1) != 0) drawLine(xpos+(spc*3),ypos,xpos+(spc*3),ypos2); // d
  if (((value >> 3) & 1) != 0) drawLine(xpos+(spc*4),ypos,xpos+(spc*4),ypos2); // e
  if (((value >> 2) & 1) != 0) drawLine(xpos+(spc*5),ypos,xpos+(spc*5),ypos2); // f
  if (((value >> 1) & 1) != 0) drawLine(xpos+(spc*6),ypos,xpos+(spc*6),ypos2); // g
  if (((value >> 0) & 1) != 0) drawLine(xpos+(spc*7),ypos,xpos+(spc*7),ypos2); // h
  

}

// --------------------------------
//        CLEAR LED MATRIX
// -------------------------------


function clearMatrix() {

  var x, y, gray=5, r=5, vs=30, hs=30;


  // clear digit
  setPenColor(60,gray,gray);
  setFillColor(60,gray,gray);
  setPenWidth(10);


  for(y=30;y<250;y+=vs) {
    
    for(x=150;x<370;x+=hs) {  
      drawCircle(x,y,r);
    }

  }


}




// --------------------------------
//     ANIMATE MATRIX COLUMN
// -------------------------------


function ledMatrix(col, value) {

  var y=0, gray=5, r=5, vs=30, hs=30;

  // clear row
  setPenColor(60,gray,gray);
  setFillColor(60,gray,gray);
  setPenWidth(10);
  
  for(y=0;y<8;y++)
    drawCircle((col*hs)+150,(y*vs)+30,r); 

  
  // light led
  setPenColor(200,gray,gray);
  setFillColor(200,gray,gray);
  setPenWidth(10);

  y=0;
  if (((value >> 0) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 1) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 2) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 3) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 4) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 5) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 6) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;
  if (((value >> 7) & 1) != 0) drawCircle((col*hs)+150,(y*vs)+30,r); y++;

}

// --------------------------------
//        CLEAR SEGMENTS
// -------------------------------


function clearSegments() {

  message("Ready.");
  segment(3,0);
  segment(4,0);
  segment(5,0);
  segment(6,0);
  segment(7,0);
  segment(8,0);

 // bargraph(0);
  clearMatrix();

}


// -------------------------
//      Handle buttons
// -------------------------


function scanButtons(x,y) {

  var keyboard = 0;

  var y1=144, y2=200, y3=250;

  // first row
  if(x>470 && x<530  && y>y1 && y<y2) keyboard=1;
  if(x>530 && x<588 && y>y1 && y<y2) keyboard=2;
  if(x>588 && x<645 && y>y1 && y<y2) keyboard=3;
  if(x>645 && x<705 && y>y1 && y<y2) keyboard=4;
  if(x>705 && x<762 && y>y1 && y<y2) keyboard=5;
  if(x>762 && x<820 && y>y1 && y<y2) keyboard=11;

  // second row
  if(x>470 && x<530 && y>y2 && y<y3) keyboard=6;
  if(x>530 && x<588 && y>y2 && y<y3) keyboard=7;
  if(x>588 && x<645 && y>y2 && y<y3) keyboard=8;
  if(x>645 && x<705 && y>y2 && y<y3) keyboard=9;
  if(x>705 && x<762 && y>y2 && y<y3) keyboard=10;
  if(x>762 && x<820 && y>y2 && y<y3) keyboard=12;

  memory[KEYREG] = keyboard;

  // RESET
  if(x>25 && x<50 && y>595 && y<625) {buttonFlag=1; return;}

  // IRQ
  if(x>3 && x<24 && y>25 && y<45) {
    buttonFlag=2; 
    //message("[EXT-IRQ]");
    return;
  }

  // Pause
  if(y>490 && y<575 && codeRunning) {
    codeRunning=false;
    message("Paused..");
  }
  else {
    if(y>490 && y<575 && !codeRunning) codeRunning=true;
    message("Running...");
  }


}


// -------------------------
//      Handle Events 
// -------------------------


function tapEvent(e){

  var flip = 0;


  var x=e.pageX-12;
  var y=e.pageY-12;
   
  y=y+5; // v-shift fix

  scanButtons(x,y);

  // DEBUG - TESTING
  //setFillColor(255,0,0);
  //drawDot(x,y,10);
  //alert("x:"+x+" y:"+y+" k:"+memory[KEYREG]); 

}


// --------------------------
//     REFRESH HARDWARE
// --------------------------


function refreshHardware(addr) {

  var s;

  if(addr<0xE0 || addr>0xFF) return;

  if(addr==TIMER) timerCounter = memory[TIMER];

  // 8x8 matrix
  if(addr>0xDF && addr<0xF0) {
    s = addr-0xE0;
    ledMatrix(s, memory[addr]);
  }

  // DIGITS
  if(addr>0xF0 && addr<0xF7) {
     s = addr-0xF1;
     segment(s, memory[addr]);
     return;
  }

  // BARGRAPH
  if(addr==0xf0) {
    bargraph(memory[addr]);
    return;
  }


}

// ------------------------
//      COMPILE CODE
// ------------------------

function compileCode(file,code) {

  resetCPU();
 
  code += "\n\n";
  lines = code.split( "\n" );
  codeCompiledOK = true;
  labelIndex = new Array();
  labelPtr = 0;

  message( "Indexing labels.." );

  defaultCodePC = regPC = RESETVECTOR;

  // PASS 1
  for( xc=0; xc<lines.length; xc++ ) {
    if( ! indexLabels( lines[xc] ) ) {
      alert( "<b>Label already defined at line "+(xc+1)+":</b> "+lines[xc] );
      return false;
    }
  }

  str = "Found " + labelIndex.length + " label";
  if( labelIndex.length != 1 ) str += "s";
  message( str + "." );

  defaultCodePC = regPC = RESETVECTOR;
  message( "Compiling code.." );

  // PASS 2
  for( x=0; x<lines.length; x++ ) {
    if( ! compileLine( lines[x], x ) ) {
      codeCompiledOK = false;
      break;
    }
  }

  if( codeLen == 0 ) {
    codeCompiledOK = false;
    message( "No code to run." );
  }

  if( codeCompiledOK ) {
    memory[defaultCodePC] = 0x00;
  } else {
    str = lines[x].replace( "<", "<" ).replace( ">", ">" );
    alert( "Syntax error line " + (x+1) + ": " + str);
  }
  
  message( "Compiled " + codeLen + " bytes." );

}


// ------------------------
//    HANDLE LABELS
// ------------------------

function indexLabels( input ) {

  var equ, addr, param;

  // remove comments

  input = input.replace( new RegExp( /^(.*?);.*/ ), "$1" );

  // trim line

  input = input.replace( new RegExp( /^\s+/ ), "" );
  input = input.replace( new RegExp( /\s+$/ ), "" );
  input = input.replace(/\t/g, " ");


  // Handle equates
  equ = input.split(" equ ");

  if(equ[1]) { 

    equ[0]=equ[0].replace(/\s/g,'');
    equ[1]=equ[1].replace(/\s/g,'');

    if( equ[1].indexOf("$")==0) { 
      param = equ[1].replace( new RegExp( /^\$/ ), "" );
      addr = parseInt( param, 16 );
    } else {
      addr = parseInt( equ[1], 10 );
    }
    
    // CPU speed
    if(equ[0]=="_SPEED") NUMINSTRUCTIONS = addr;
  
    return pushLabel(equ[0]+ "|" + addr);

  }


  // Figure out how many bytes this instuction takes

  thisPC = defaultCodePC;
  codeLen = 0;

  compileLine( input );
  regPC += codeLen;

  // Find command or label

  if( input.match( new RegExp( /^\w+:/ ) ) ) {
    label = input.replace( new RegExp( /(^\w+):.*$/ ), "$1" );
    return pushLabel( label + "|" + thisPC );
  }
  return true;

}


function pushLabel( name ) {
  if( findLabel( name ) ) return false;
  labelIndex[labelPtr++] = name + "|";
  return true;
}


function findLabel( name ) {
  for( m=0; m<labelIndex.length; m++ ) {
    nameAndAddr = labelIndex[m].split( "|" );
    if( name == nameAndAddr[0] ) {
      return true;
    }
  }
  return false;
}


function setLabelPC( name, addr ) {
  for( i=0; i<labelIndex.length; i++ ) {
    nameAndAddr = labelIndex[i].split( "|" );
    if( name == nameAndAddr[0] ) {
      labelIndex[i] = name + "|" + addr;
      return true;
    }
  }
  return false;
}


function getLabelPC( name ) {
  for( i=0; i<labelIndex.length; i++ ) {
    nameAndAddr = labelIndex[i].split( "|" );
    if( name == nameAndAddr[0] ) {
      return (nameAndAddr[1]);
    }
  }
  return -1;
}


// -----------------------------
//     COMPILE LINE OF CODE
// -----------------------------

function compileLine( input, lineno ) {

  var equ, addr, param;

  // remove comments and html tags

  input = input.replace( new RegExp( /^(.*?);.*/ ), "$1" );

  // trim line and replace tabs

  input = input.replace( new RegExp( /^\s+/ ), "" );
  input = input.replace( new RegExp( /\s+$/ ), "" );
  input = input.replace(/\t/g, " ");


  // skip if equate
  equ = input.split(" equ ");
  if(equ[1]) return true;


  // Find command or label

  if( input.match( new RegExp( /^\w+:/ ) ) ) {
    label = input.replace( new RegExp( /(^\w+):.*$/ ), "$1" );
    if( input.match( new RegExp( /^\w+:[\s]*\w+.*$/ ) ) ) {
      input = input.replace( new RegExp( /^\w+:[\s]*(.*)$/ ), "$1" );
      command = input.replace( new RegExp( /^(\w+).*$/ ), "$1" );
    } else {
      command = "";
    }
  } else {
    command = input.replace( new RegExp( /^(\w+).*$/ ), "$1" );
  }

  // Blank line?  Return.

  if( command == "" )
    return true;

  command = command.toUpperCase();


  // handle *ORG
  if( input.match( /^\*[\s]*ORG[\s]*[\$]?[0-9a-f]*$/ ) ) {
   
    // equ spotted
    param = input.replace( new RegExp( /^[\s]*\*[\s]*ORG[\s]*/ ), "" );
    if( param[0] == "$" ) {
      param = param.replace( new RegExp( /^\$/ ), "" );
      addr = parseInt( param, 16 );
    } else {
      addr = parseInt( param, 10 );
    }
    if( (addr < 0) || (addr > 0xffff) ) {
      alert( "Unable to relocate code outside 64k memory" );
      return false;
    }
    defaultCodePC = addr;
    return true;
  }

  if( input.match( /^\w+\s+.*?$/ ) ) {
    param = input.replace( new RegExp( /^\w+\s+(.*?)/ ), "$1" );
  } else {
    if( input.match( /^\w+$/ ) ) {
      param = "";
    } else {
      return false;
    }
  }

  param = param.replace( /[ ]/g, "" );


  // ----- COMMANDS -----
  if( command == "DCB" ) return DCB( param );


  for( o=0; o<Opcodes.length; o++ ) {
    if( Opcodes[o][0] == command ) {
      if( checkSingle( param, Opcodes[o][10] ) ) return true;
      if( checkImmediate( param, Opcodes[o][1] ) ) return true;
      if( checkZeroPage( param, Opcodes[o][2] ) ) return true;
      if( checkZeroPageX( param, Opcodes[o][3] ) ) return true;
      if( checkZeroPageY( param, Opcodes[o][4] ) ) return true;
      if( checkAbsoluteX( param, Opcodes[o][6] ) ) return true;
      if( checkAbsoluteY( param, Opcodes[o][7] ) ) return true;
      if( checkIndirectX( param, Opcodes[o][8] ) ) return true;
      if( checkIndirectY( param, Opcodes[o][9] ) ) return true;
      if( checkAbsolute( param, Opcodes[o][5] ) ) return true;
      if( checkBranch( param, Opcodes[o][11] ) ) return true;
    }
  }
  return false; // Unknown opcode
}


// -------------------
//    HANDLE DCB
// -------------------

function DCB( param ) {

  values = param.split( "," );
  if( values.length == 0 ) return false;

  for( v=0; v<values.length; v++ ) {

    str = values[v];

    if( str != undefined && str != null && str.length > 0 ) {

      ch = str.substring( 0, 1 );

      if( ch == "$" ) {   // Hex
        number = parseInt( str.replace( /^\$/, "" ), 16 );
        pushByte( number );
      } 

      else if(ch == "%") {  // Binary 
        number = parseInt(str.replace( /^\%/, "" ), 2 );
        pushByte( number );
      } 
      
      else if(ch == "@") {  // ASCII
        str = str.replace( /^\@/, "" );
        number = str.charCodeAt(0);
        pushByte( number );
      } 

      else if( ch >= "0" && ch <= "9" ) {  // Decimal
        number = parseInt( str, 10 );
        pushByte( number );
      } 

      else {
        return false;
      }

    }
  }

  return true;

}


// -------------------------
//     EXPRESSIONS CHECK
// -------------------------

function checkBranch( param, opcode ) {
  if( opcode == 0x00 ) return false;

  addr = -1;
  if( param.match( /\w+/ ) )
    addr = getLabelPC( param );
  if( addr == -1 ) { pushWord( 0x00 ); return false; }
  pushByte( opcode );
  if( addr < (defaultCodePC-RESETVECTOR) ) {  // Backwards?
    pushByte( (0xff - ((defaultCodePC-RESETVECTOR)-addr)) & 0xff );
    return true;
  }
  pushByte( (addr-(defaultCodePC-RESETVECTOR)-1) & 0xff );
  return true;
}


function checkImmediate( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( new RegExp( /^#\$[0-9a-f]{1,2}$/i ) ) ) {
    pushByte( opcode );
    value = parseInt( param.replace( /^#\$/, "" ), 16 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  if( param.match( new RegExp( /^#[0-9]{1,3}$/i ) ) ) {
    pushByte( opcode );
    value = parseInt( param.replace( /^#/, "" ), 10 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  // Label lo/hi
  if( param.match( new RegExp( /^#[<>]\w+$/ ) ) ) {
    label = param.replace( new RegExp( /^#[<>](\w+)$/ ), "$1" );
    hilo = param.replace( new RegExp( /^#([<>]).*$/ ), "$1" );
    pushByte( opcode );
    if( findLabel( label ) ) {
      addr = getLabelPC( label );
      switch( hilo ) {
        case ">":
          pushByte( (addr >> 8) & 0xff );
          return true;
          break;
        case "<":
          pushByte( addr & 0xff );
          return true;
          break;
        default:
          return false;
          break;
      }
    } else {
      pushByte( 0x00 );
      return true;
    }
  }
  return false;
}


function checkIndirectX( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\(\$[0-9a-f]{1,2},X\)$/i ) ) {
    pushByte( opcode );
    value = param.replace( new RegExp( /^\(\$([0-9a-f]{1,2}).*$/i ), "$1" );
    if( value < 0 || value > 255 ) return false;
    pushByte( parseInt( value, 16 ) );
    return true;
  }
  return false;
}


function checkIndirectY( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\(\$[0-9a-f]{1,2}\),Y$/i ) ) {
    pushByte( opcode );
    value = param.replace( new RegExp( /^\([\$]([0-9a-f]{1,2}).*$/i ), "$1" );
    if( value < 0 || value > 255 ) return false;
    pushByte( parseInt( value, 16 ) );
    return true;
  }
  return false;
}


function checkSingle( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param != "" ) return false;
  pushByte( opcode );
  return true;
}


function checkZeroPage( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\$[0-9a-f]{1,2}$/i ) ) {
    pushByte( opcode );
    value = parseInt( param.replace( /^\$/, "" ), 16 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  if( param.match( /^[0-9]{1,3}$/i ) ) {
    pushByte( opcode );
    value = parseInt( param, 10 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  return false;
}


function checkAbsoluteX( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\$[0-9a-f]{3,4},X$/i ) ) {
    pushByte( opcode );
    number = param.replace( new RegExp( /^\$([0-9a-f]*),X/i ), "$1" );
    value = parseInt( number, 16 );
    if( value < 0 || value > 0xffff ) return false;
    pushWord( value );
    return true;
  }

  if( param.match( /^\w+,X$/i ) ) {
    param = param.replace( new RegExp( /,X$/i ), "" );
    pushByte( opcode );
    if( findLabel( param ) ) {
      addr = getLabelPC( param );
      if( addr < 0 || addr > 0xffff ) return false;
      pushWord( addr );
      return true;
    } else {
      pushWord( 0x1234 );
      return true;
    }
  }

  return false;
}


function checkAbsoluteY( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\$[0-9a-f]{3,4},Y$/i ) ) {
    pushByte( opcode );
    number = param.replace( new RegExp( /^\$([0-9a-f]*),Y/i ), "$1" );
    value = parseInt( number, 16 );
    if( value < 0 || value > 0xffff ) return false;
    pushWord( value );
    return true;
  }

  // it could be a label too..

  if( param.match( /^\w+,Y$/i ) ) {
    param = param.replace( new RegExp( /,Y$/i ), "" );
    pushByte( opcode );
    if( findLabel( param ) ) {
      addr = getLabelPC( param );
      if( addr < 0 || addr > 0xffff ) return false;
      pushWord( addr );
      return true;
    } else {
      pushWord( 0x1234 );
      return true;
    }
  }
  return false;
}


function checkZeroPageX( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\$[0-9a-f]{1,2},X/i ) ) {
    pushByte( opcode );
    number = param.replace( new RegExp( /^\$([0-9a-f]{1,2}),X/i ), "$1" );
    value = parseInt( number, 16 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  if( param.match( /^[0-9]{1,3},X/i ) ) {
    pushByte( opcode );
    number = param.replace( new RegExp( /^([0-9]{1,3}),X/i ), "$1" );
    value = parseInt( number, 10 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  return false;
}

function checkZeroPageY( param, opcode ) {
  if( opcode == 0x00 ) return false;
  if( param.match( /^\$[0-9a-f]{1,2},Y/i ) ) {
    pushByte( opcode );
    number = param.replace( new RegExp( /^\$([0-9a-f]{1,2}),Y/i ), "$1" );
    value = parseInt( number, 16 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  if( param.match( /^[0-9]{1,3},Y/i ) ) {
    pushByte( opcode );
    number = param.replace( new RegExp( /^([0-9]{1,3}),Y/i ), "$1" );
    value = parseInt( number, 10 );
    if( value < 0 || value > 255 ) return false;
    pushByte( value );
    return true;
  }
  return false;
}


function checkAbsolute( param, opcode ) {
  if( opcode == 0x00 ) return false;
  pushByte( opcode );
  if( param.match( /^\$[0-9a-f]{3,4}$/i ) ) {
    value = parseInt( param.replace( /^\$/, "" ), 16 );
    if( value < 0 || value > 0xffff ) return false;
    pushWord( value );
    return true;
  }
  // it could be a label too..
  if( param.match( /^\w+$/ ) ) {
    if( findLabel( param ) ) {
      addr = (getLabelPC( param ));
      if( addr < 0 || addr > 0xffff ) return false;
      pushWord( addr );
      return true;
    } else {
      pushWord( 0x1234 );
      return true;
    }
  }
  return false;
}


// ------------------------
//    STACK EMULATION
// ------------------------


function stackPush( value ) {
  if( regSP >= 0 ) {
    regSP--;
    memory[(regSP&0xff)+0x100] = value & 0xff;
  } else {
    alert( "Stack full: " + regSP );
    codeRunning = false;
  }
}


function stackPop() {
  if( regSP < 0x100 ) {
    value = memory[regSP+0x100];
    regSP++;
    return value;
  } else {
    alert( "Stack empty" );
    codeRunning = false;
    return 0;
  }
}


function pushByte( value ) {
  memory[defaultCodePC] = value & 0xff;
  defaultCodePC++;
  codeLen++;
}


function pushWord( value ) {
  pushByte( value & 0xff );
  pushByte( (value>>8) & 0xff );
}


function popByte() {
  return( memory[regPC++] & 0xff );
}


function popWord() {
  return popByte() + (popByte() << 8);
}

//     MEMORY PEEK & POKE
// ------------------------

function memStoreByte( addr, value ) {

  memory[ addr ] = (value & 0xff); 

  if(addr>RESETVECTOR) alert("WARNING: Writing ROM area: 0x"+ addr.toString(16));

  // HARDWARE INTERFACE 
  refreshHardware(addr); 
  
}


// * RANDOM GENERATOR LOCATED AT 0xFE

function memReadByte( addr ) {

  if( addr == 0xfe ) return Math.floor( Math.random()*256 ); // random value in RAM 0xfe
  return memory[addr];

}


// -------------------------
//      ALU EMULATION
// -------------------------


function jumpBranch( offset ) {
  if( offset > 0x7f )
    regPC = (regPC - (0x100 - offset));
  else
    regPC = (regPC + offset );
}


function doCompare( reg, val ) {

  if( (reg+val) > 0xff ) regP |= 1; else regP &= 0xfe;
  val = (reg-val);
  if( val ) regP &= 0xfd; else regP |= 0x02;
  if( val & 0x80 ) regP |= 0x80; else regP &= 0x7f;

}


function testSBC( value ) {

  if( (regA ^ value ) & 0x80 )
    vflag = 1;
  else
    vflag = 0;

  if( regP & 8 ) {
    tmp = 0xf + (regA & 0xf) - (value & 0xf) + (regP&1);

    if( tmp < 0x10 ) {
      w = 0;
      tmp -= 6;
    } else {
      w = 0x10;
      tmp -= 0x10;
    }

    w += 0xf0 + (regA & 0xf0) - (value & 0xf0);
    if( w < 0x100 ) {
      regP &= 0xfe;
      if( (regP&0xbf) && w<0x80) regP&=0xbf;
      w -= 0x60;
    } else {
      regP |= 1;
      if( (regP&0xbf) && w>=0x180) regP&=0xbf;
    }

    w += tmp;
  } else {
    w = 0xff + regA - value + (regP&1);
    if( w<0x100 ) {
      regP &= 0xfe;
      if( (regP&0xbf) && w<0x80 ) regP&=0xbf;
    } else {
      regP |= 1;
      if( (regP&0xbf) && w>= 0x180) regP&=0xbf;
    }
  }

  regA = w & 0xff;
  if( regA ) regP &= 0xfd; else regP |= 0x02;
  if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;

}


function testADC( value ) {

  if( (regA ^ value) & 0x80 ) {
    regP &= 0xbf;
  } else {
    regP |= 0x40;
  }

  if( regP & 8 ) {
    tmp = (regA & 0xf) + (value & 0xf) + (regP&1);
    if( tmp >= 10 ) {
      tmp = 0x10 | ((tmp+6)&0xf);
    }
    tmp += (regA & 0xf0) + (value & 0xf0);
    if( tmp >= 160) {
      regP |= 1;
      if( (regP&0xbf) && tmp >= 0x180 ) regP &= 0xbf;
      tmp += 0x60;
    } else {
      regP &= 0xfe;
      if( (regP&0xbf) && tmp<0x80 ) regP &= 0xbf;
    }
  } else {
    tmp = regA + value + (regP&1);
    if( tmp >= 0x100 ) {
      regP |= 1;
      if( (regP&0xbf) && tmp>=0x180) regP &= 0xbf;
    } else {
      regP &= 0xfe;
      if( (regP&0xbf) && tmp<0x80) regP &= 0xbf;
    }
  }

  regA = tmp & 0xff;
  if( regA ) regP &= 0xfd; else regP |= 0x02;
  if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;

}


// ------------------------
//    EXECUTE OPCODE
// ------------------------

function multiexecute() {
   
  for( w=0; w<NUMINSTRUCTIONS; w++ ) execute(); 

}


function execute() {


  if( ! codeRunning ) return;


  opcode = popByte();

  switch( opcode ) {

    case 0xbb:
    case 0x00:                            // BRK implied
      codeRunning = false;
      disableIRQ();
      hexDump(0);
      break;

    case 0x01:                            // ORA INDX
      addr = popByte() + regX;
      value = memReadByte( addr ) + (memReadByte( addr+1) << 8);
      regA |= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x05:                            // ORA ZP
      zp = popByte();
      regA |= memReadByte( zp );
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x06:                            // ASL ZP
      zp = popByte();
      value = memReadByte( zp );
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      memStoreByte( zp, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x08:                            // PHP
      stackPush( regP );
      break;

    case 0x09:                            // ORA IMM
      regA |= popByte();
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x0a:                            // ASL IMPL
      regP = (regP & 0xfe) | ((regA>>7)&1);
      regA = regA<<1;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x0d:                            // ORA ABS
      regA |= memReadByte( popWord() );
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x0e:                            // ASL ABS
      addr = popWord();
      value = memReadByte( addr );
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 2;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x10:                            // BPL
      offset = popByte();
      if( (regP & 0x80) == 0 ) jumpBranch( offset );
      break;

    case 0x11:                            // ORA INDY
      zp = popByte();
      value = memReadByte(zp) + (memReadByte(zp+1)<<8) + regY;
      regA |= memReadByte(value);
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x15:                            // ORA ZPX
      addr = (popByte() + regX) & 0xff;
      regA |= memReadByte(addr);
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x16:                            // ASL ZPX
      addr = (popByte() + regX) & 0xff;
      value = memReadByte(addr);
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x18:                            // CLC
      regP &= 0xfe;
      break;

    case 0x19:                            // ORA ABSY
      addr = popWord() + regY;
      regA |= memReadByte( addr );
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x1d:                            // ORA ABSX
      addr = popWord() + regX;
      regA |= memReadByte( addr );
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x1e:                            // ASL ABSX
      addr = popWord() + regX;
      value = memReadByte( addr );
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x20:                            // JSR ABS
      addr = popWord();
      currAddr = regPC-1;
      stackPush( ((currAddr >> 8) & 0xff) );
      stackPush( (currAddr & 0xff) );
      regPC = addr;
      break;

    case 0x21:                            // AND INDX
      addr = (popByte() + regX)&0xff;
      value = memReadByte( addr ) + (memReadByte( addr+1) << 8);
      regA &= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x24:                            // BIT ZP
      zp = popByte();
      value = memReadByte( zp );
      if( value & regA ) regP &= 0xfd; else regP |= 0x02;
      regP = (regP & 0x3f) | (value & 0xc0);
      break;

    case 0x25:                            // AND ZP
      zp = popByte();
      regA &= memReadByte( zp );
      if( regA ) regP &= 0xfd; else regP |= 2;
      if( regA & 0x80 ) regP &= 0x80; else regP &= 0x7f;
      break;

    case 0x26:                            // ROL ZP
      sf = (regP & 1);
      addr = popByte();
      value = memReadByte( addr ); //  & regA;  -- Thanks DMSC ;)
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      value |= sf;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x28:                            // PLP
      regP = stackPop() | 0x20;
      break;

    case 0x29:                            // AND IMM
      regA &= popByte();
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x2a:                            // ROL A
      sf = (regP&1);
      regP = (regP&0xfe) | ((regA>>7)&1);
      regA = regA << 1;
      regA |= sf;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x2c:                            // BIT ABS
      value = memReadByte( popWord() );
      if( value & regA ) regP &= 0xfd; else regP |= 0x02;
      regP = (regP & 0x3f) | (value & 0xc0);
      break;

    case 0x2d:                            // AND ABS
      value = memReadByte( popWord() );
      regA &= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x2e:                            // ROL ABS
      sf = regP & 1;
      addr = popWord();
      value = memReadByte( addr );
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      value |= sf;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x30:                            // BMI
      offset = popByte();
      if( regP & 0x80 ) jumpBranch( offset );
      break;

    case 0x31:                            // AND INDY
      zp = popByte();
      value = memReadByte(zp) + (memReadByte(zp+1)<<8) + regY;
      regA &= memReadByte(value);
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x35:                            // AND INDX
      zp = popByte();
      value = memReadByte(zp) + (memReadByte(zp+1)<<8) + regX;
      regA &= memReadByte(value);
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x36:                            // ROL ZPX
      sf = regP & 1;
      addr = (popByte() + regX) & 0xff;
      value = memReadByte( addr );
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      value |= sf;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x38:                            // SEC
      regP |= 1;
      break;

    case 0x39:                            // AND ABSY
      addr = popWord() + regY;
      value = memReadByte( addr );
      regA &= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x3d:                            // AND ABSX
      addr = popWord() + regX;
      value = memReadByte( addr );
      regA &= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x3e:                            // ROL ABSX
      sf = regP&1;
      addr = popWord() + regX;
      value = memReadByte( addr );
      regP = (regP & 0xfe) | ((value>>7)&1);
      value = value << 1;
      value |= sf;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x41:                            // EOR INDX
      zp = (popByte() + regX)&0xff;
      value = memReadByte(zp) + (memReadByte(zp+1)<<8);
      regA ^= memReadByte(value);
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x45:                            // EOR ZPX
      addr = (popByte() + regX) & 0xff;
      value = memReadByte( addr );
      regA ^= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x46:                            // LSR ZP
      addr = popByte() & 0xff;
      value = memReadByte( addr );
      regP = (regP & 0xfe) | (value&1);
      value = value >> 1;
      memStoreByte( addr, value );
      if( value != 0 ) regP &= 0xfd; else regP |= 2;
      if( (value&0x80) == 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x48:                            // PHA
      stackPush( regA );
      break;

    case 0x49:                            // EOR IMM
      regA ^= popByte();
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x4a:                            // LSR
      regP = (regP&0xfe) | (regA&1);
      regA = regA >> 1;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x4c:                            // JMP abs
      regPC = popWord();
      break;

    case 0x4d:                            // EOR abs
      addr = popWord();
      value = memReadByte( addr );
      regA ^= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x4e:                           // LSR abs
      addr = popWord();
      value = memReadByte( addr );
      regP = (regP&0xfe)|(value&1);
      value = value >> 1;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x50:                           // BVC (on overflow clear)
      offset = popByte();
      if( (regP & 0x40) == 0 ) jumpBranch( offset );
      break;

    case 0x51:                           // EOR INDY
      zp = popByte();
      value = memReadByte(zp) + (memReadByte(zp+1)<<8) + regY;
      regA ^= memReadByte(value);
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x55:                           // EOR ZPX
      addr = (popByte() + regX) & 0xff;
      regA ^= memReadByte( addr );
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x56:                           // LSR ZPX
      addr = (popByte() + regX) & 0xff;
      value = memReadByte( addr );
      regP = (regP&0xfe) | (value&1);
      value = value >> 1;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x58:      // CLI
      irqDisable = false;    
      buttonFlag = 0;
      enableIRQ();  
      break;

    case 0x59:                           // EOR ABSY
      addr = popWord() + regY;
      value = memReadByte( addr );
      regA ^= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x5d:                           // EOR ABSX
      addr = popWord() + regX;
      value = memReadByte( addr );
      regA ^= value;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x5e:                           // LSR ABSX
      addr = popWord() + regX;
      value = memReadByte( addr );
      regP = (regP&0xfe) | (value&1);
      value = value >> 1;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x40:    // RTI        
    case 0x60:                            // RTS
      regPC = (stackPop()+1) | (stackPop()<<8);
      break;

    case 0x61:                           // ADC INDX
      zp = (popByte() + regX)&0xff;
      addr = memReadByte(zp) + (memReadByte(zp+1)<<8);
      value = memReadByte( addr );
      testADC( value );
      break;

    case 0x65:                           // ADC ZP
      addr = popByte();
      value = memReadByte( addr );
      testADC( value );
      break;

    case 0x66:                           // ROR ZP
      sf = regP&1;
      addr = popByte();
      value = memReadByte( addr );
      regP = (regP&0xfe)|(value&1);
      value = value >> 1;
      if( sf ) value |= 0x80;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x68:                           // PLA
      regA = stackPop();
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x69:                           // ADC IMM
      value = popByte();
      testADC( value );
      break;

    case 0x6a:                           // ROR A
      sf = regP&1;
      regP = (regP&0xfe) | (regA&1);
      regA = regA >> 1;
      if( sf ) regA |= 0x80;
      if( regA ) regP &= 0xfd; else regP |= 0x02;
      if( regA & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x6c: // JMP INDIR
      // regPC = memReadByte(popByte()) + (memReadByte(popByte())<<8);
      break;

    case 0x6d:                           // ADC ABS
      addr = popWord();
      value = memReadByte( addr );
      testADC( value );

      break;

    case 0x6e:                           // ROR ABS
      sf = regP&1;
      addr = popWord();
      value = memReadByte( addr );
      regP = (regP&0xfe)|(value&1);
      value = value >> 1;
      if( sf ) value |= 0x80;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x70:                           // BVS (branch on overflow set)
      offset = popByte();
      if( regP & 0x40 ) jumpBranch( offset );
      break;

    case 0x71:                           // ADC INY
      zp = popByte();
      addr = memReadByte(zp) + (memReadByte(zp+1)<<8);
      value = memReadByte( addr + regY );
      testADC( value );
      break;

    case 0x75:                           // ADC ZPX
      addr = (popByte() + regX) & 0xff;
      value = memReadByte( addr );
      regP = (regP&0xfe) | (value&1);
      testADC( value );
      break;

    case 0x76:                           // ROR ZPX
      sf = (regP&1);
      addr = (popByte() + regX) & 0xff;
      value = memReadByte( addr );
      regP = (regP&0xfe) | (value&1);
      value = value >> 1;
      if( sf ) value |= 0x80;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x78:     // SEI
      irqDisable = true;    
      disableIRQ();
      break;

    case 0x79:                           // ADC ABSY
      addr = popWord();
      value = memReadByte( addr + regY );
      testADC( value );
      break;

    case 0x7d:                           // ADC ABSX
      addr = popWord();
      value = memReadByte( addr + regX );
      testADC( value );
      break;

    case 0x7e:                           // ROR ABSX
      sf = regP&1;
      addr = popWord() + regX;
      value = memReadByte( addr );
      regP = (regP&0xfe) | (value&1);
      value = value >> 1;
      if( value ) value |= 0x80;
      memStoreByte( addr, value );
      if( value ) regP &= 0xfd; else regP |= 0x02;
      if( value & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x81:                           // STA INDX
      zp = (popByte()+regX)&0xff;
      addr = memReadByte(zp) + (memReadByte(zp+1)<<8);
      memStoreByte( addr, regA );
      break;

    case 0x84:                           // STY ZP
      memStoreByte( popByte(), regY );
      break;

    case 0x85:                           // STA ZP
      memStoreByte( popByte(), regA );
      break;

    case 0x86:                           // STX ZP
      memStoreByte( popByte(), regX );
      break;

    case 0x88:                           // DEY (1 byte)
      regY = (regY-1) & 0xff;
      if( regY ) regP &= 0xfd; else regP |= 0x02;
      if( regY & 0x80 ) regP |= 0x80; else regP &= 0x7f;
      break;

    case 0x8a:                           // TXA (1 byte);
      regA = regX & 0xff;

// -----------------------
//      IRQ HANDLER
// -----------------------

function handleIRQ() {

  currAddr = regPC-1;

  stackPush( ((currAddr >> 8) & 0xff) );
  stackPush( (currAddr & 0xff) );

  regPC = IRQVECTOR;

}


function enableIRQ() {

  var timing = memory[TIMER];

  if(timing) irqIntervalV = setInterval( "handleIRQ()", timing );
   
}

function disableIRQ() {

  if(irqIntervalV) clearInterval( irqIntervalV );
  irqDisable = true;

}


// -----------------------
//      HEX DUMP
// -----------------------


function num2hex( nr ) {

  str = "0123456789abcdef";
  hi = ((nr&0xf0)>>4);
  lo = (nr&15);
  return str.substring( hi, hi+1  ) + str.substring( lo, lo+1 );

}

function addr2hex( addr ) {
  return num2hex((addr>>8)&0xff)+num2hex(addr&0xff);
}


function hexDump(addr) {

  var s, n, x, html=""; 
  var c = regPC-1;

  html += "[HEXDUMP]\n PC=0x" + c.toString(16) + ", A=" + regA + ", X="+regX + ", Y=" + regY +"\n";

  for( x=addr; x<(addr+256); x++ ) {

    if( (x&7) == 0 ) {
     
      // PC counter
      html += "\n"+num2hex( ((x>>8)&0xff) );
      html += num2hex( (x&0xff) );
      html += ": ";

    }
    
    n=memory[x];
   
    s=n.toString(16);
    if(n<16) s = "0"+s;
    html += s +" ";

  }

  alert(html);

}

//       RESET 
// --------------------

function resetCPU() {

 for( x=0; x<0xffff; x++ )  // clear ZP, stack and memory
    memory[x] = 0x00;

  regA = regX = regY = 0;
  defaultCodePC = regPC = RESETVECTOR;
  regSP = 0x100;
  regP = 0x20;

  codeRunning = false;
  stepflag = false;
  
}



// ----------------------
//    RUN BINARY CODE
// ----------------------

function runBinary() {

  if( codeRunning ) {
    message("[STOP]: PC=0x" + regPC.toString(16) + ", A=0x" + regA.toString(16) + ", X=0x"+regX.toString(16) + ", Y=0x" + regY.toString(16) );
    codeRunning = false;
    clearInterval( runInterval );
  } 

  else {
    message("Running...");
    codeRunning = true;
    runInterval = setInterval( "multiexecute()",EXECINTERVAL );
    
  }

}
 	


function displayREGS() {

  var msg;

  msg = "0x"+regPC.toString(16)+"0x"+regA.toString(16)+"0x"+regX.toString(16)+"0x"+regY.toString(16);
  message(msg);


}


// --------------------------
//    CoMPILE AND RUN CODE
// --------------------------


function run() {
 
 
    // Get inline ASM code

    compileCode("",data);

}

  lda KEY
  cmp #10
  bne iwt9
  lda #0
  sta KEY
iwt9:
  cmp #12  ; ENTER
  beq iwt2

  ldy KEY
  sty BCDLO
  ldx #5
  jsr showDigit

  jsr getkey
  lda KEY
  cmp #10
  bne iwt8
  lda #0
  sta KEY
iwt8:
  cmp #12   ; ENTER
  beq iwt2

  ldy BCDLO
  sty BCDHI
  ldx #4
  jsr showDigit
  
  ldy KEY
  sty BCDLO
  ldx #5
  jsr showDigit
  jmp iwt

iwt2:
  jsr bcd2bin
  lda BCDBIN
  cmp #47
  bpl iwt4
  sta PATNUM
  jsr getpat
  rts

iwt4:
  lda #0
  sta PATNUM
  jsr getpat
  rts  


;---------------------
;  SECRET CODE ENTRY
;---------------------

cdentry:

  lda #0
  jsr dismsg

cden1:
  ldy #0
cden2:
  jsr getkey
  lda KEY
  cmp #12
  beq cd2
  cmp SECODE,y
  bne cden1

  iny
  cpy #4
  bne cden2
cd2:
  rts

dismsg: 
  
  asl
  sta TEMP1	
  asl
  clc
  adc TEMP1	  
  tax
  ldy #0
  
mess1:

  lda MESSAGES,x
  sta DIGITS,y
  iny
  inx
  cpy #6
  bne mess1
  rts

  rts

bin2bcd:

  ldy #0
  lda BCDBIN
  beq zero
  cmp #10
  bmi zero
sub1:
  iny
  sec
  sbc #10
  cmp #10
  bpl sub1
zero:
  sta BCDLO
  sty BCDHI
  rts

  asl

  sta BCDBIN
  rts


;---------------------
;  RESET PAT POINTER
;---------------------

resetpat:

  lda #$40
  sta PATPTRH
  sta PATBEGH
  sta PATENDH
 
  lda #0
  sta PATPTRL
  sta PATBEGL
  sta PATENDL

  sta DIRFLG
  rts


;---------------
;  FIND PATTERN 
;---------------

getpat:

  inc HOLDFLG
  jsr resetpat
  
  ldy #0
  sty PATCNT

scan:
  lda ($15),y
  cmp PATNUM   
  beq found
  
  clc
  lda PATPTRL
  adc #9
  sta PATPTRL
  lda PATPTRH
  adc #0
  sta PATPTRH
  jmp scan
  
found:

  lda PATPTRH
  sta PATBEGH
  lda PATPTRL
  sta PATBEGL
  
scan2:
  clc
  lda PATPTRL
  adc #9
  sta PATPTRL
  lda PATPTRH
  adc #0
  sta PATPTRH
  
  lda ($15),y
  cmp PATNUM   ; end of pattern?
  beq scan2
  
  lda PATPTRH
  sta PATENDH
  lda PATPTRL
  sta PATENDL
  
  lda PATBEGH
  sta PATPTRH
  lda PATBEGL
  sta PATPTRL
 
  dec HOLDFLG
  rts


;----------------------
;      NEXT FRAME
;----------------------

nxtfrm:

  lda DIRFLG
  bne prevfrm  

  clc
  lda PATPTRL
  adc #9
  sta PATPTRL
  lda PATPTRH
  adc #0
  sta PATPTRH
  
  lda PATPTRH
  cmp PATENDH
  bne contfrm
  lda PATPTRL
  cmp PATENDL
  bne contfrm
  
  ; restart frame
  lda PATBEGH
  sta PATPTRH
  lda PATBEGL
  sta PATPTRL
  inc PATCNT    ; repeat counter
 
contfrm:  
  rts
 
prevfrm:
  sec
  lda PATPTRL
  sbc #9
  sta PATPTRL
  lda PATPTRH
  sbc #0
  sta PATPTRH

  lda PATPTRH
  cmp PATBEGH
  bne contfrm 
  lda PATPTRL
  cmp PATBEGL
  bne contfrm

  ; restart frame
  lda PATENDH
  sta PATPTRH
  lda PATENDL
  sta PATPTRL

  sec
  lda PATPTRL
  sbc #9
  sta PATPTRL
  lda PATPTRH
  sbc #0
  sta PATPTRH

  inc PATCNT   
  rts


;-----------------------
; DISPLAY PATTERN FRAME
;-----------------------

disfrm:

  lda HOLDFLG
  beq df1
  rts
  
df1:
  ldx #0
  ldy #1  ; after ID
  
nx1:
  lda ($15),y
  sta MATRIX,x
  inx
  iny
  cpx #8
  bne nx1

  jsr nxtfrm 
  rts


;-----------------------
; DISPLAY NV MESSAGE
;-----------------------

disnv:

  ldx #0
  ldy #0
  
nvx1:
  lda ($25),y
  cmp #$55
  beq nvdone 
  sta MATRIX,x
  inx
  iny
  cpx #8
  bne nvx1

  lda MSGPTRL
  clc
  adc #1
  sta MSGPTRL
  lda MSGPTRH
  adc #0
  sta MSGPTRH   
  rts

nvdone:

  lda #$35
  sta MSGPTRH
  lda #0
  sta MSGPTRL
  rts
